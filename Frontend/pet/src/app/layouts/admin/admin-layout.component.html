<mat-sidenav-container class="admin-container">

  <!-- SIDEBAR -->
  <mat-sidenav #sidenav mode="side" opened class="admin-sidenav">

    <div class="logo">
      <span class="logo-icon">🐾</span>
      <span class="logo-text">Pet Admin</span>
    </div>

    <mat-nav-list class="admin-nav-list">
      <ng-container *ngFor="let item of visibleNavItems()">

        <!-- Menu có submenu -->
        <ng-container *ngIf="item.children">
          <div class="menu-group-header" (click)="toggleItem(item.label)">
            <mat-icon class="menu-icon">{{ item.icon }}</mat-icon>
            <span class="menu-label">{{ item.label }}</span>
            <mat-icon class="expand-arrow">{{ isOpen(item.label) ? 'expand_less' : 'expand_more' }}</mat-icon>
          </div>
          <div class="submenu-list" *ngIf="isOpen(item.label)">
            <a mat-list-item *ngFor="let child of item.children" routerLinkActive="active-link" [routerLink]="child.route">
              <mat-icon matListItemIcon class="submenu-icon">{{ child.icon }}</mat-icon>
              <span matListItemTitle>{{ child.label }}</span>
            </a>
          </div>
        </ng-container>

        <!-- Menu không có submenu -->
        <a mat-list-item *ngIf="!item.children" routerLinkActive="active-link" [routerLink]="item.route">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>

      </ng-container>

      <div *ngIf="visibleNavItems().length === 0" class="no-access-debug">
        <mat-icon>lock_outline</mat-icon>
        <p>Không có quyền truy cập</p>
        <small>Role: {{ authService.role() }}</small>
      </div>
    </mat-nav-list>

  </mat-sidenav>

  <!-- MAIN CONTENT -->
  <mat-sidenav-content>

    <!-- TOOLBAR -->
    <mat-toolbar color="primary" class="admin-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="toolbar-title">Pet Admin Panel</span>

      <span class="spacer"></span>

      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>

      <!-- Phần User Items - Tái sử dụng từ Home -->
      <app-user-items></app-user-items>

    </mat-toolbar>

    <!-- CONTENT AREA -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
