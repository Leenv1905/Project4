<mat-sidenav-container class="admin-container">

  <!-- SIDEBAR -->
  <mat-sidenav mode="side" opened class="admin-sidenav">

    <div class="logo">
      <span class="logo-icon">🐾</span>
      <span class="logo-text">Pet Admin</span>
    </div>

    <mat-nav-list>
      <ng-container *ngFor="let item of visibleNavItems">

        <!-- Menu có submenu -->
        <mat-expansion-panel *ngIf="item.children" class="menu-group">
          <mat-expansion-panel-header>
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </mat-expansion-panel-header>

          <mat-nav-list>
            <a mat-list-item
               *ngFor="let child of item.children"
               routerLinkActive="active-link"
               [routerLink]="child.route">
              <mat-icon class="submenu-icon">{{ child.icon }}</mat-icon>
              <span>{{ child.label }}</span>
            </a>
          </mat-nav-list>
        </mat-expansion-panel>

        <!-- Menu không có submenu -->
        <a mat-list-item
           *ngIf="!item.children"
           routerLinkActive="active-link"
           [routerLink]="item.route">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>

      </ng-container>
    </mat-nav-list>
  </mat-sidenav>

  <!-- MAIN CONTENT -->
  <mat-sidenav-content>

    <!-- TOOLBAR -->
    <mat-toolbar color="primary" class="admin-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="toolbar-title">Pet Admin Panel</span>

      <span class="spacer"></span>

      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>
      <!-- Phần User Items - Tái sử dụng từ Home -->
      <app-user-items></app-user-items>

<!--      <button mat-icon-button>-->
<!--        <mat-icon>account_circle</mat-icon>-->
<!--      </button>-->
    </mat-toolbar>

    <!-- CONTENT AREA -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
