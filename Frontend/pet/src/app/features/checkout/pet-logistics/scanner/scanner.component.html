<div class="min-h-screen bg-gray-900 text-white flex flex-col">

  <!-- HEADER -->
  <header class="bg-white/10 border-b border-white/20 h-16 flex items-center px-6 gap-4">
    <a routerLink="/operator/tasks/verify" class="text-white/70 hover:text-white text-sm">← Quay lại</a>
    <span class="font-bold text-lg">Quét Microchip</span>
    <span *ngIf="task" class="text-sm text-white/60 ml-auto">Pet: {{ task.pet?.name }} ({{ task.pet?.petCode }})</span>
  </header>

  <!-- KHÔNG CÓ TASK -->
  <div *ngIf="!task" class="flex-1 flex flex-col items-center justify-center p-6">
    <p class="text-white/60 mb-4">Không có nhiệm vụ được chọn.</p>
    <a routerLink="/operator/tasks/verify" class="bg-blue-700 text-white px-6 py-2 rounded hover:bg-blue-600">
      Chọn nhiệm vụ
    </a>
  </div>

  <!-- SCANNER UI -->
  <div *ngIf="task" class="flex-1 flex flex-col p-6 gap-6 max-w-lg mx-auto w-full">

    <!-- CAMERA VIEW (decorative) -->
    <div class="relative aspect-video bg-black rounded-xl overflow-hidden">
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-64 h-64 border-2 border-blue-400 relative">
          <div class="absolute left-0 right-0 h-0.5 bg-blue-400 animate-pulse top-1/2"></div>
          <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-blue-300"></div>
          <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-blue-300"></div>
          <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-blue-300"></div>
          <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-blue-300"></div>
        </div>
      </div>
      <p class="absolute bottom-3 w-full text-center text-white/50 text-xs">Nhập URL ảnh/video bên dưới</p>
    </div>

    <!-- INPUT URL -->
    <div class="bg-white rounded-xl p-5">
      <label class="block text-gray-700 font-medium text-sm mb-2">
        URL ảnh / video quét Microchip <span class="text-red-500">*</span>
      </label>
      <input
        class="w-full border rounded px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 mb-4"
        [(ngModel)]="chipUrl"
        placeholder="https://storage.example.com/chip-video.mp4"
      />
      <button
        class="w-full bg-blue-800 text-white py-3 rounded font-medium hover:bg-blue-700 disabled:opacity-50"
        [disabled]="!chipUrl.trim() || isSubmitting"
        (click)="confirm()">
        Xác nhận và quay lại chi tiết
      </button>
    </div>

  </div>

</div>
