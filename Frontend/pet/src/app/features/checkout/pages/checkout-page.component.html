<div class="checkout">

  <div class="container">

    <!-- LEFT: FORM -->
    <div class="form">

      <h2>Thông tin nhận hàng</h2>

      <input
        placeholder="Họ và tên"
        [(ngModel)]="form.customerName"
        required />

      <input
        placeholder="Số điện thoại"
        [(ngModel)]="form.phone"
        required />

      <input
        placeholder="Địa chỉ giao hàng"
        [(ngModel)]="form.address"
        required />

      <textarea
        placeholder="Ghi chú cho người bán (tùy chọn)"
        [(ngModel)]="form.note">
      </textarea>

      <h3>Phương thức thanh toán</h3>
      <div class="payment-methods">
        <label>
          <input type="radio" name="paymentMethod" value="COD" [(ngModel)]="form.paymentMethod" />
          Thanh toán khi nhận hàng (COD)
        </label>
        <label>
          <input type="radio" name="paymentMethod" value="VNPAY" [(ngModel)]="form.paymentMethod" />
          Thanh toán qua VNPAY
        </label>
      </div>

    </div>

    <!-- RIGHT: SUMMARY -->
    <div class="summary">

      <h2>Đơn hàng của bạn ({{ selectedItems.length }} pet)</h2>

      <div class="order-items">
        <div *ngFor="let item of selectedItems" class="order-item">
          <img [src]="item.image" [alt]="item.name" class="item-image">
          <div class="item-detail">
            <h4>{{ item.name }}</h4>
            <p>{{ item.shopName }}</p>
            <p class="price">{{ item.price | number }} ₫</p>
          </div>
        </div>
      </div>

      <hr />

      <div class="total">
        <span>Tổng thanh toán:</span>
        <strong>{{ total() | number }} ₫</strong>
      </div>

      <button class="place-order-btn" (click)="placeOrder()">
        Đặt hàng và thanh toán
      </button>

    </div>

  </div>
</div>
