<div class="product-list">

  <div class="grid">
    <app-product-card
      *ngFor="let product of products(); trackBy: trackById"
      [product]="product"
    />
  </div>

  <app-pagination
    [currentPage]="pagination().page"
    [totalPages]="totalPages()"
  ></app-pagination>

</div>
