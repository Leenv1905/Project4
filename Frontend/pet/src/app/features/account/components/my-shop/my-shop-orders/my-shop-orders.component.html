<div class="shop-orders">

  <div class="tabs">

    <div
      *ngFor="let s of statuses"
      class="tab"
      [class.active]="activeTab() === s.key"
      (click)="activeTab.set(s.key)"
    >
      {{ s.label }} ({{ count(s.key) }})
    </div>

    <div
      class="tab"
      (click)="activeTab.set('all')"
    >
      Tất cả
    </div>

  </div>

  <div class="order-list">

    <div class="order-card" *ngFor="let order of filteredOrders()">

      <div class="header">
        <span>#{{ order.id }}</span>
        <span>{{ getStatusLabel(order.status) }}</span>
      </div>

      <div class="items">
        <div *ngFor="let item of order.items">
          {{ item.name }} x{{ item.quantity }}
        </div>
      </div>

      <div class="footer">

        <div class="total">
          {{ order.totalAmount | number }} ₫
        </div>

        <div class="actions">

          <ng-container *ngIf="order.status === 'pending'">

            <button class="confirm" (click)="confirmOrder(order.id)">
              ✔ Xác nhận
            </button>

            <button class="reject" (click)="rejectOrder(order.id)">
              ✖ Từ chối
            </button>

          </ng-container>

        </div>

      </div>

    </div>

  </div>

</div>
