<div class="account-edit">

  <div class="header">
    <h2>Chỉnh sửa thông tin cá nhân</h2>
  </div>

  <div class="edit-grid">

    <!-- Cột 1: Avatar -->
    <div class="avatar-column">
      <div class="avatar-box">
        <img [src]="avatarPreview()" alt="Avatar" class="avatar">
        <label class="change-avatar">
          Thay đổi ảnh
          <input type="file" accept="image/*" (change)="onFileSelected($event)" hidden>
        </label>
      </div>
    </div>

    <!-- Cột 2 & 3: Form -->
    <div class="form-column">
      <div class="form-grid">

        <div class="form-group">
          <label>Họ và tên <span class="required">*</span></label>
          <input [(ngModel)]="editForm().name" placeholder="Nhập họ và tên" />
        </div>

        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input [(ngModel)]="editForm().email" type="email" placeholder="Nhập email" />
        </div>

        <div class="form-group">
          <label>Số điện thoại <span class="required">*</span></label>
          <input [(ngModel)]="editForm().phone" placeholder="Nhập số điện thoại" />
        </div>

        <div class="form-group">
          <label>Ngày sinh</label>
          <input [(ngModel)]="editForm().dateOfBirth" type="date" />
        </div>

        <div class="form-group full-width">
          <label>Địa chỉ <span class="required">*</span></label>
          <textarea [(ngModel)]="editForm().address" rows="3" placeholder="Nhập địa chỉ giao hàng"></textarea>
        </div>

      </div>

      <!-- Nút hành động -->
      <div class="form-actions">
        <button class="cancel-btn" (click)="cancel()">Hủy</button>
        <button class="save-btn" (click)="saveChanges()">Lưu thay đổi</button>
      </div>
    </div>

  </div>
</div>
