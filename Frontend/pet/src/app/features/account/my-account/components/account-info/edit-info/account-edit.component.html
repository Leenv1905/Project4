<div class="account-edit">

  <div class="header">
    <h2>Edit Personal Information</h2>
  </div>

  <div class="edit-grid">

    <!-- Avatar Column -->
    <div class="avatar-column">
      <div class="avatar-box">
        <img
          [src]="avatarPreview()"
          alt="Profile Avatar"
          class="avatar">

        <label class="change-avatar">
          Change Avatar
          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)"
            hidden>
        </label>
      </div>
    </div>

    <!-- Form Column -->
    <div class="form-column">
      <div class="form-grid">

        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input [(ngModel)]="editForm().name" placeholder="Enter your full name" />
        </div>

        <div class="form-group">
          <label>Email Address <span class="required">*</span></label>
          <input [(ngModel)]="editForm().email" type="email" placeholder="Enter email address" />
        </div>

        <div class="form-group">
          <label>Phone Number <span class="required">*</span></label>
          <input [(ngModel)]="editForm().phone" placeholder="Enter phone number" />
        </div>

        <div class="form-group">
          <label>Date of Birth</label>
          <input [(ngModel)]="editForm().dateOfBirth" type="date" />
        </div>

        <div class="form-group full-width">
          <label>Delivery Address <span class="required">*</span></label>
          <textarea
            [(ngModel)]="editForm().address"
            rows="4"
            placeholder="Enter your full delivery address">
          </textarea>
        </div>

      </div>

      <!-- Action Buttons -->
      <div class="form-actions">
        <button class="cancel-btn" (click)="cancel()">Cancel</button>
        <button class="save-btn" (click)="saveChanges()">Save Changes</button>
      </div>
    </div>

  </div>
</div>

<app-notification-modal
  *ngIf="modal()"
  [title]="modal()!.title"
  [message]="modal()!.message"
  [type]="modal()!.type"
  (closed)="onModalClosed()">
</app-notification-modal>
