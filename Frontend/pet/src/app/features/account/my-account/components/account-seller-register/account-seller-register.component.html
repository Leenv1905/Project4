<div class="seller-register-card">
  <h2>Đăng ký trở thành người bán</h2>
  <p>Cung cấp thông tin để bắt đầu bán thú cưng trên GuPet</p>

  <form (ngSubmit)="onSubmit()" class="register-form">
    <div class="form-group">
      <label>Tên cửa hàng (Hiển thị cho khách hàng)</label>
      <input type="text" [(ngModel)]="sellerData.displayName" name="displayName" required placeholder="Ví dụ: GuPet Farm">
    </div>

    <div class="form-group">
      <label>Loại hình kinh doanh</label>
      <select [(ngModel)]="sellerData.sellerType" name="sellerType">
        <option value="INDIVIDUAL">Cá nhân</option>
        <option value="SHOP">Cửa hàng</option>
        <option value="FARM">Trang trại nuôi phối</option>
      </select>
    </div>

    <div class="form-group">
      <label>Mã số thuế (nếu có)</label>
      <input type="text" [(ngModel)]="sellerData.taxCode" name="taxCode">
    </div>

    <div class="form-group">
      <label>Giới thiệu về shop</label>
      <textarea [(ngModel)]="sellerData.bio" name="bio" rows="3"></textarea>    </div>

    <button type="submit" class="btn-submit">Gửi đơn đăng ký</button>
  </form>
</div>

<app-notification-modal
  *ngIf="modal"
  [title]="modal.title"
  [message]="modal.message"
  [type]="modal.type"
  (closed)="onModalClosed()"
/>
