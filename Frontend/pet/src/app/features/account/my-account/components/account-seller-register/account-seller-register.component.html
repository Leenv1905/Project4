<div class="seller-register">

  <div class="register-card">

    <div class="header">
      <h2>Become a Seller</h2>
      <p>Join our platform and start selling pets to thousands of pet lovers</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="register-form">

      <div class="form-grid">

        <div class="form-group">
          <label>Shop Name <span class="required">*</span></label>
          <input
            type="text"
            [(ngModel)]="sellerData.displayName"
            name="displayName"
            required
            placeholder="e.g. GuPet Paradise">
        </div>

        <div class="form-group">
          <label>Business Type</label>
          <select [(ngModel)]="sellerData.sellerType" name="sellerType">
            <option value="INDIVIDUAL">Individual Seller</option>
            <option value="SHOP">Pet Shop</option>
            <option value="FARM">Breeding Farm</option>
          </select>
        </div>

        <div class="form-group">
          <label>Tax Code (if any)</label>
          <input
            type="text"
            [(ngModel)]="sellerData.taxCode"
            name="taxCode"
            placeholder="Tax identification number">
        </div>

        <div class="form-group full-width">
          <label>Shop Introduction</label>
          <textarea
            [(ngModel)]="sellerData.bio"
            name="bio"
            rows="4"
            placeholder="Tell customers about your shop, experience, and what makes your pets special...">
          </textarea>
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="cancel-btn" >Cancel</button>
        <button type="submit" class="submit-btn" [disabled]="isLoading">
          {{ isLoading ? 'Submitting...' : 'Submit Application' }}
        </button>
      </div>

    </form>
  </div>
</div>

<app-notification-modal
  *ngIf="modal"
  [title]="modal.title"
  [message]="modal.message"
  [type]="modal.type"
  (closed)="onModalClosed()">
</app-notification-modal>
