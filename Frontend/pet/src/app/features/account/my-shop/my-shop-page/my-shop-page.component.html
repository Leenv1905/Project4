<div class="shop">

  <div class="container">

    <app-my-shop-sidebar
      [active]="tab()"
      (changeTab)="setTab($event)"
    />

    <div class="content">

      <app-my-shop-dashboard *ngIf="tab() === 'dashboard'" />

      <app-my-shop-products *ngIf="tab() === 'products'" />

      <app-my-shop-orders *ngIf="tab() === 'orders'" />

<!--      <app-my-shop-info *ngIf="tab() === 'info'" />-->
      <app-add-product *ngIf="tab() === 'add-product'" />
      <app-edit-product *ngIf="tab() === 'edit-product'" />
      <app-my-shop-order-detail *ngIf="tab() === 'order-detail'"/>

    </div>

  </div>

</div>
