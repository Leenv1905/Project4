<div class="add-product">
  <div class="header">
    <div class="title">
      <button class="back-btn" (click)="backToProducts()">← Quay lại danh sách</button>
      <h2>Thêm thú cưng mới</h2>
      <p class="subtitle">Điền thông tin chi tiết cho pet</p>
    </div>
    <div class="actions">
      <button class="discard-btn" (click)="discard()">Hủy bỏ</button>
      <button class="draft-btn" (click)="saveDraft()">Lưu nháp</button>
      <button class="publish-btn" (click)="publish()">Đăng bán</button>
    </div>
  </div>

  <div class="layout">
    <div class="left">
      <div class="card">
        <h3>Thông tin định danh</h3>
        <div class="form-group">
          <label>Mã chip thú cưng *</label>
          <input
            placeholder="Ví dụ: CZAREP8B1LVXNV3"
            [(ngModel)]="product.petCode"
            maxlength="15"
            (input)="validatePetCode($event)"
            class="pet-code-input"
          />
          <small *ngIf="product.petCode?.length > 0 && product.petCode?.length < 15" class="error-text">
            Mã chip chưa đủ định dạng (Hiện có: {{product.petCode.length}}/15 ký tự)
          </small>
        </div>
      </div>

      <div class="card">
        <h3>Thông tin cơ bản</h3>
        <input placeholder="Tên thú cưng *" [(ngModel)]="product.name" />

        <div class="row">
          <div class="form-group">
            <label>Loài</label>
            <select [(ngModel)]="product.species">
              <option value="Chó">Chó</option>
              <option value="Mèo">Mèo</option>
              <option value="Khác">Khác</option>
            </select>
          </div>
          <div class="form-group">
            <label>Giống</label>
            <input placeholder="Ví dụ: Poodle, Corgi..." [(ngModel)]="product.breed" />
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Màu lông</label>
            <input placeholder="Màu lông" [(ngModel)]="product.color" />
          </div>
          <div class="form-group">
            <label>Giới tính</label>
            <select [(ngModel)]="product.gender">
              <option value="male">Đực</option>
              <option value="female">Cái</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Cân nặng (kg)</label>
            <input type="number" step="0.1" [(ngModel)]="product.weight" />
          </div>
          <div class="form-group">
            <label>Ngày sinh</label>
            <input type="date" value="2022-12-20" disabled />
          </div>
        </div>

        <label>Mô tả</label>
        <textarea rows="5" placeholder="Mô tả tính cách..." [(ngModel)]="product.description"></textarea>
      </div>
    </div>

    <div class="right">
      <div class="card">
        <h3>Giá bán</h3>
        <input type="number" placeholder="Giá bán (VNĐ) *" [(ngModel)]="product.price" />
      </div>

      <div class="card">
        <h3>Hình ảnh thú cưng & AI Render</h3>
        <input type="file" (change)="onFileSelected($event)" accept="image/*" class="mb-3" />

        <div class="ai-box mt-3" *ngIf="originalPreview">
          <div class="d-flex gap-3 mb-3">
            <div class="p-view">
              <small>Ảnh gốc</small>
              <img [src]="originalPreview" class="rounded shadow-sm">
            </div>

            <div class="p-view" *ngIf="aiImageUrl">
              <small class="text-purple">Bản AI ✨</small>
              <img [src]="aiImageUrl" class="rounded shadow-sm border-purple">
            </div>
          </div>

          <button type="button" class="btn-ai" (click)="generateAiImage()" [disabled]="isAiLoading">
            <span *ngIf="!isAiLoading">🪄 Tạo phong cách AI (DALL-E)</span>
            <span *ngIf="isAiLoading">⏳ Đang xử lý...</span>
          </button>
        </div>

        <div class="image-preview mt-4">
          <div class="image-card" *ngFor="let img of finalImages; let i = index">
            <img [src]="img.imageUrl"> <span class="badge-ai" *ngIf="img.isAiProcessed">AI</span>
            <button class="remove-btn" (click)="removeImage(i)">×</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<app-loading-modal [visible]="isLoading" message="Đang đăng bán thú cưng..." />

<app-notification-modal
  *ngIf="modal.show"
  [title]="modal.title"
  [message]="modal.message"
  [type]="modal.type"
  (closed)="closeModal()"
/>
