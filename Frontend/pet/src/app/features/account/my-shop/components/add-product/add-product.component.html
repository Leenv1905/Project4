<div class="add-product">

  <div class="header">
    <div class="title">
      <button class="back-btn" (click)="backToProducts()">
        ← Quay lại danh sách
      </button>
      <h2>Thêm thú cưng mới</h2>
      <p class="subtitle">Điền thông tin chi tiết cho pet</p>
    </div>

    <div class="actions">
      <button class="discard-btn" (click)="discard()">Hủy bỏ</button>
      <button class="draft-btn" (click)="saveDraft()">Lưu nháp</button>
      <button class="publish-btn" (click)="publish()">Đăng bán</button>
    </div>
  </div>

  <div class="layout">

    <!-- LEFT: Thông tin chính -->
    <div class="left">

      <div class="card">
        <h3>Thông tin cơ bản</h3>

        <input placeholder="Tên thú cưng *" [(ngModel)]="product.name" />

        <div class="row">
          <div class="form-group">
            <label>Loài</label>
            <select [(ngModel)]="product.species">
              <option value="Chó">Chó</option>
              <option value="Mèo">Mèo</option>
              <option value="Khác">Khác</option>
            </select>
          </div>

          <div class="form-group">
            <label>Giống</label>
            <input placeholder="Ví dụ: Poodle, Corgi..." [(ngModel)]="product.breed" />
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Màu lông</label>
            <input placeholder="Màu lông" [(ngModel)]="product.color" />
          </div>

          <div class="form-group">
            <label>Giới tính</label>
            <select [(ngModel)]="product.gender">
              <option value="male">Đực</option>
              <option value="female">Cái</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Cân nặng (kg)</label>
            <input type="number" step="0.1" [(ngModel)]="product.weight" />
          </div>

          <div class="form-group">
            <label>Ngày sinh</label>
            <input type="date" value="2022-12-20" disabled />
            <small style="color:#888; font-size:13px;">(Tạm fix - sẽ mở sau)</small>
          </div>
        </div>

        <label>Mô tả</label>
        <textarea rows="5" placeholder="Mô tả tính cách, sức khỏe, đặc điểm..." [(ngModel)]="product.description"></textarea>
      </div>

    </div>

    <!-- RIGHT: Giá & Hình ảnh -->
    <div class="right">

      <div class="card">
        <h3>Giá bán</h3>
        <input type="number" placeholder="Giá bán (VNĐ) *" [(ngModel)]="product.price" />
      </div>

      <div class="card">
        <h3>Hình ảnh thú cưng</h3>
        <input type="file" multiple accept="image/*" (change)="uploadImages($event)" />

        <div class="image-preview">
          <div class="image-card" *ngFor="let img of images; let i = index">
            <img [src]="img" alt="preview">
            <button class="remove-btn" (click)="removeImage(i)">×</button>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
