<div class="shop-edit">

  <div class="header">
    <h2>Edit Shop Information</h2>
  </div>

  <div class="edit-grid">

    <!-- Avatar Column -->
    <div class="avatar-column">
      <div class="avatar-box">
        <img
          [src]="shopAvatar()"
          alt="Shop Avatar"
          class="shop-avatar">

        <label class="change-avatar-btn">
          Change Shop Avatar
          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)"
            hidden>
        </label>
      </div>
      <p class="tip">This image will be displayed as your shop's profile picture</p>
    </div>

    <!-- Form Column -->
    <div class="form-column">

      <div class="form-grid">

        <div class="form-group">
          <label>Shop Name <span class="required">*</span></label>
          <input
            [(ngModel)]="editForm().shopName"
            placeholder="Enter shop name" />
        </div>

        <div class="form-group">
          <label>Phone Number <span class="required">*</span></label>
          <input
            [(ngModel)]="editForm().phone"
            placeholder="Enter phone number" />
        </div>

        <div class="form-group full-width">
          <label>Shop Address <span class="required">*</span></label>
          <textarea
            [(ngModel)]="editForm().address"
            rows="2"
            placeholder="Enter full shop address">
          </textarea>
        </div>

        <div class="form-group full-width">
          <label>Shop Description</label>
          <textarea
            [(ngModel)]="editForm().description"
            rows="5"
            placeholder="Tell customers about your shop, experience, and specialty...">
          </textarea>
        </div>

      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button class="cancel-btn" (click)="cancel()">Cancel</button>
        <button class="save-btn" (click)="saveChanges()">Save Changes</button>
      </div>

    </div>
  </div>
</div>
