<div class="revenue-dashboard">

  <div class="header">
    <div>
      <h1>Revenue Report</h1>
      <p class="subtitle">April 2026 • Last 30 days</p>
    </div>
    <div class="period-selector">
      <button class="active">This Month</button>
      <button>Last Month</button>
      <button>Last 3 Months</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card" *ngFor="let s of stats()">
      <div class="stat-icon">{{ s.icon }}</div>
      <div class="stat-content">
        <span class="stat-title">{{ s.title }}</span>
        <span class="stat-value">{{ s.value }}</span>
        <span class="stat-change" [class.up]="s.trend === 'up'" [class.down]="s.trend === 'down'">
          {{ s.change }}
        </span>
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts">
    <div class="chart-card">
      <h3>Revenue Trend (Last 30 days)</h3>
      <canvas id="revenueChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Orders This Month</h3>
      <canvas id="ordersChart"></canvas>
    </div>
  </div>

  <!-- TOP PRODUCTS -->
  <div class="top-products">
    <h3>Top Selling Products</h3>
    <table>
      <thead>
      <tr>
        <th>Product</th>
        <th>Units Sold</th>
        <th>Revenue</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let p of topProducts()">
        <td>{{ p.name }}</td>
        <td><strong>{{ p.sold }}</strong></td>
        <td>{{ p.revenue }}</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
