<div class="add-product">

  <!-- HEADER -->
  <div class="header">
    <div class="title">
      <button class="back" (click)="backToProducts()">
        ← Quay lại danh sách
      </button>
      <h2>Chỉnh sửa thú cưng</h2>
      <p class="subtitle">Cập nhật thông tin sản phẩm</p>
    </div>

    <div class="actions">
      <button class="discard" (click)="backToProducts()">Hủy</button>
      <button class="publish" (click)="updateProduct()">Cập nhật</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="layout">

    <!-- LEFT -->
    <div class="left">
      <div class="card">
        <h3>Thông tin cơ bản</h3>

        <input placeholder="Tên thú cưng *" [(ngModel)]="product.name" />

        <div class="row">
          <div class="form-group">
            <label>Loài</label>
            <select [(ngModel)]="product.species">
              <option value="Chó">Chó</option>
              <option value="Mèo">Mèo</option>
              <option value="Khác">Khác</option>
            </select>
          </div>

          <div class="form-group">
            <label>Giống</label>
            <input placeholder="Giống thú cưng" [(ngModel)]="product.breed" />
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Màu lông</label>
            <input placeholder="Màu lông" [(ngModel)]="product.color" />
          </div>

          <div class="form-group">
            <label>Giới tính</label>
            <select [(ngModel)]="product.gender">
              <option value="male">Đực</option>
              <option value="female">Cái</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Cân nặng (kg)</label>
            <input type="number" step="0.1" [(ngModel)]="product.weight" />
          </div>

          <div class="form-group">
            <label>Tuổi (tháng)</label>
            <input type="number" [(ngModel)]="product.age" />
          </div>
        </div>

        <label>Mô tả</label>
        <textarea rows="5" [(ngModel)]="product.description" placeholder="Mô tả chi tiết về thú cưng..."></textarea>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="card">
        <h3>Giá bán</h3>
        <input type="number" placeholder="Giá bán (VNĐ) *" [(ngModel)]="product.price" />
      </div>

      <div class="card">
        <h3>Hình ảnh</h3>
        <input type="file" multiple accept="image/*" (change)="uploadImages($event)" />

        <div class="image-preview">
          <div class="image-card" *ngFor="let img of images; let i = index">
            <img [src]="img" alt="preview">
            <button class="remove" (click)="removeImage(i)">×</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Trạng thái sức khỏe</h3>
        <label class="toggle">
          <span>Đã tiêm vaccine</span>
          <input type="checkbox" [(ngModel)]="product.vaccinated" />
        </label>
        <label class="toggle">
          <span>Đã triệt sản</span>
          <input type="checkbox" [(ngModel)]="product.neutered" />
        </label>
      </div>
    </div>

  </div>
</div>
