<div class="edit-user-page">

  <div class="header">
    <h2>Chỉnh sửa người dùng</h2>
  </div>

  <div class="form-container">

    <div class="form-grid">

      <!-- Avatar Section -->
      <div class="avatar-section">
        <img [src]="editUser.avatar" alt="Avatar" class="avatar-preview">
        <p class="tip">Avatar của người dùng</p>

        <!-- Nút hành động nằm dưới avatar -->
        <div class="form-actions">
          <button class="cancel-btn" (click)="cancel()">Hủy</button>
          <button class="update-btn" (click)="updateUser()">Cập nhật</button>
        </div>
      </div>

      <!-- Form Fields -->
      <div class="fields">

        <div class="form-group">
          <label>Họ và tên <span class="required">*</span></label>
          <input [(ngModel)]="editUser.name" placeholder="Nhập họ và tên" />
        </div>

        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" [(ngModel)]="editUser.email" placeholder="example@email.com" />
        </div>

        <div class="form-group">
          <label>Vai trò</label>
          <select [(ngModel)]="editUser.role">
            <option *ngFor="let role of roles" [value]="role">{{ role | titlecase }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Tuổi</label>
          <input type="number" [(ngModel)]="editUser.age" placeholder="Nhập tuổi" min="1" />
        </div>

        <div class="form-group">
          <label>Số điện thoại</label>
          <input [(ngModel)]="editUser.phone" placeholder="Nhập số điện thoại" />
        </div>

        <div class="form-group">
          <label>Mật khẩu mới (nếu muốn đổi)</label>
          <input type="password" [(ngModel)]="editUser.password" placeholder="Để trống nếu không đổi" />
        </div>

        <div class="form-group">
          <label>Xác nhận mật khẩu mới</label>
          <input type="password" [(ngModel)]="editUser.confirmPassword" placeholder="Nhập lại mật khẩu mới" />
        </div>

      </div>
    </div>

  </div>
</div>
