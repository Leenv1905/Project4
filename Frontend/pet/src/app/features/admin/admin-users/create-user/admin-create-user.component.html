<div class="create-user-page">

  <div class="header">
    <h2>Tạo người dùng mới</h2>
  </div>

  <div class="form-container">

    <div class="form-grid">

      <!-- Avatar Preview -->
      <div class="avatar-section">
        <img [src]="newUser.avatar" alt="Avatar Preview" class="avatar-preview">
        <p class="tip">Avatar sẽ được tạo tự động</p>
        <!-- Action Buttons -->
        <div class="form-actions">
          <button class="cancel-btn" (click)="cancel()">Hủy</button>
          <button class="create-btn" (click)="createUser()">Tạo người dùng</button>
        </div>
      </div>


      <!-- Form Fields -->
      <div class="fields">

        <div class="form-group">
          <label>Họ và tên <span class="required">*</span></label>
          <input [(ngModel)]="newUser.name" placeholder="Nhập họ và tên" required />
        </div>

        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" [(ngModel)]="newUser.email" placeholder="example@email.com" required />
        </div>

        <div class="form-group">
          <label>Vai trò (Role)</label>
          <select [(ngModel)]="newUser.role">
            <option *ngFor="let role of roles" [value]="role">
              {{ role | titlecase }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Tuổi</label>
          <input type="number" [(ngModel)]="newUser.age" placeholder="Nhập tuổi" min="1" />
        </div>

        <div class="form-group">
          <label>Số điện thoại</label>
          <input [(ngModel)]="newUser.phone" placeholder="Nhập số điện thoại" />
        </div>

        <div class="form-group">
          <label>Mật khẩu <span class="required">*</span></label>
          <input type="password" [(ngModel)]="newUser.password" placeholder="Nhập mật khẩu" required />
        </div>

        <div class="form-group">
          <label>Xác nhận mật khẩu <span class="required">*</span></label>
          <input type="password" [(ngModel)]="newUser.confirmPassword" placeholder="Nhập lại mật khẩu" required />
        </div>

      </div>
    </div>


  </div>
</div>
