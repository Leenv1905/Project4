<div class="create-user-page">
  <div class="header">
    <h2>Tao nguoi dung moi</h2>
  </div>

  <div class="form-container">
    <div class="form-grid">
      <div class="avatar-section">
        <img [src]="newUser.avatar" alt="Avatar Preview" class="avatar-preview">
        <p class="tip">Avatar se duoc tao tu dong</p>
        <div class="form-actions">
          <button class="cancel-btn" (click)="cancel()">Huy</button>
          <button class="create-btn" (click)="createUser()" [disabled]="isSaving">Tao nguoi dung</button>
        </div>
      </div>

      <div class="fields">
        <div class="form-group">
          <label>Ho va ten <span class="required">*</span></label>
          <input [(ngModel)]="newUser.name" placeholder="Nhap ho va ten" required />
        </div>

        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" [(ngModel)]="newUser.email" placeholder="example@email.com" required />
        </div>

        <div class="form-group">
          <label>Vai tro</label>
          <select [(ngModel)]="newUser.role">
            <option *ngFor="let role of roles" [value]="role">
              {{ role | titlecase }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>So dien thoai</label>
          <input [(ngModel)]="newUser.phone" placeholder="Nhap so dien thoai" />
        </div>

        <div class="form-group">
          <label>Dia chi</label>
          <input [(ngModel)]="newUser.address" placeholder="Nhap dia chi" />
        </div>

        <div class="form-group">
          <label>Mat khau <span class="required">*</span></label>
          <input type="password" [(ngModel)]="newUser.password" placeholder="Nhap mat khau" required />
        </div>

        <div class="form-group">
          <label>Xac nhan mat khau <span class="required">*</span></label>
          <input type="password" [(ngModel)]="newUser.confirmPassword" placeholder="Nhap lai mat khau" required />
        </div>
      </div>
    </div>
  </div>
</div>
