<ng-container *ngIf="auth.showLoginModal()">
  <div class="modal-backdrop">

    <div class="modal" >

      <mat-tab-group [(selectedIndex)]="tabIndex">

        <!-- LOGIN -->
        <mat-tab label="Login">
          <div class="form">

            <input matInput placeholder="Email" [(ngModel)]="email" />

            <input
              matInput
              type="password"
              placeholder="Password"
              [(ngModel)]="password"
              (keyup.enter)="login()"
            />

            <button mat-raised-button color="primary" (click)="login()">
              Login
            </button>

          </div>
        </mat-tab>

        <!-- REGISTER -->
        <mat-tab label="Register">
          <div class="form">

            <input matInput placeholder="Email" />
            <input matInput type="password" placeholder="Password" />

            <button mat-raised-button color="primary" (click)="register()">
              Register
            </button>

          </div>
        </mat-tab>

      </mat-tab-group>

      <button class="close-btn" mat-button (click)="auth.closeLogin()">
        ✕
      </button>

    </div>

  </div>
</ng-container>
