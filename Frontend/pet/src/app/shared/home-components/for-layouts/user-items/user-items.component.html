<!-- Search Icon -->
<mat-icon>search</mat-icon>

<!-- User Menu -->
<button mat-icon-button [matMenuTriggerFor]="userMenu">
  <mat-icon>account_circle</mat-icon>
</button>

<mat-menu #userMenu="matMenu">

  <!-- Chưa đăng nhập -->
  <ng-container *ngIf="!isAuthenticated(); else loggedIn">
    <button mat-menu-item (click)="login()">
      <mat-icon>login</mat-icon>
      <span>Đăng nhập</span>
    </button>
    <button mat-menu-item (click)="login()">
      <mat-icon>person_add</mat-icon>
      <span>Đăng ký</span>
    </button>
  </ng-container>

  <!-- Đã đăng nhập -->
  <ng-template #loggedIn>
    <button mat-menu-item disabled>
      <span>👋 {{ auth.user()?.name || 'Người dùng' }}</span>
    </button>
    <button mat-menu-item disabled>
      <span>Role: <strong>{{ auth.role() | titlecase }}</strong></span>
    </button>

    <mat-divider></mat-divider>

    <!-- User & Shop -->
    <button mat-menu-item
            *ngIf="isUserOrShop()"
            (click)="goToAccount()">
      <mat-icon>person</mat-icon>
      <span>My Account</span>
    </button>

    <button mat-menu-item
            *ngIf="isShop()"
            (click)="goToShop()">
      <mat-icon>store</mat-icon>
      <span>My Shop</span>
    </button>

    <!-- Operator & Admin -->
    <button mat-menu-item
            *ngIf="isAdminOrOperator()"
            (click)="goToAdmin()">
      <mat-icon>admin_panel_settings</mat-icon>
      <span>Trang quản trị</span>
    </button>

    <mat-divider></mat-divider>

    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Đăng xuất</span>
    </button>
  </ng-template>
</mat-menu>

<!-- Cart & Wishlist chỉ hiển thị khi là user hoặc shop -->
<ng-container *ngIf="showCartAndWishlist()">
  <app-wishlist-dropdown />
  <app-cart-dropdown />
</ng-container>

<!-- User Modal (Login/Register) -->
<app-user-modal />
