<mat-toolbar class="header" [class.scrolled]="isScrolled()">

  <!-- Logo -->
  <img
    src="/assets/logo/gupet.png"
    class="logo"
    alt="Gupet"
    routerLink="/"
  />

  <!-- Desktop menu -->
  <nav class="nav desktop-menu">
    <a mat-button routerLink="/" routerLinkActive="active">HOME</a>
    <a mat-button routerLink="/about" routerLinkActive="active">ABOUT</a>
    <a mat-button routerLink="/shop" routerLinkActive="active">SHOP</a>
    <a mat-button routerLink="/blog" routerLinkActive="active">BLOGS</a>
    <a mat-button routerLink="/contact" routerLinkActive="active">CONTACT</a>
  </nav>

  <span class="spacer"></span>

  <!-- User items -->
  <app-user-items />

  <!-- Mobile menu icon -->
  <button
    mat-icon-button
    class="mobile-menu-btn"
    (click)="toggleDrawer(true)"
  >
    <mat-icon>menu</mat-icon>
  </button>
</mat-toolbar>

<!-- Mobile drawer -->
<mat-drawer-container class="drawer-container">
  <mat-drawer
    mode="over"
    position="start"
    [opened]="drawerOpen()"
    class="mobile-drawer"
  >
    <button mat-icon-button class="close-drawer" (click)="toggleDrawer(false)">
      <mat-icon>close</mat-icon>
    </button>

    <div class="drawer-menu">
      <a mat-button routerLink="/" (click)="toggleDrawer(false)" routerLinkActive="active">HOME</a>
      <a mat-button routerLink="/about" (click)="toggleDrawer(false)" routerLinkActive="active">ABOUT</a>
      <a mat-button routerLink="/shop" (click)="toggleDrawer(false)" routerLinkActive="active">SHOP</a>
      <a mat-button routerLink="/blog" (click)="toggleDrawer(false)" routerLinkActive="active">BLOGS</a>
      <a mat-button routerLink="/contact" (click)="toggleDrawer(false)" routerLinkActive="active">CONTACT</a>
    </div>
  </mat-drawer>
</mat-drawer-container>
