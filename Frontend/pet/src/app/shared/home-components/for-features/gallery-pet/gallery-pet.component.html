<section id="hero" class="hero">

  <swiper-container
    slides-per-view="1"
    loop="true"
    autoplay-delay="4000"
    navigation="true"
    pagination="true"
    class="pet-swiper"
  >

    <swiper-slide
      *ngFor="let slide of slides(); trackBy: trackById"
    >
      <div class="slide">

        <div class="content">

          <!-- Text Content -->
          <div class="text">
            <span class="badge">HOT SALE</span>
            <h1>{{ slide.title }}</h1>
            <p>{{ slide.description }}</p>

            <a
              mat-raised-button
              class="cta-btn"
              [routerLink]="['/productdetail', slide.id]"
            >
              {{ slide.buttonText }}
            </a>
          </div>

          <!-- Image -->
          <div class="image">
            <img [src]="slide.image" [alt]="slide.title" />
          </div>

        </div>
      </div>
    </swiper-slide>

  </swiper-container>
</section>
