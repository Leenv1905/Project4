<section id="limited-offer" class="limited-offer">

  <div class="container">

    <!-- IMAGE -->
    <div class="image">
      <img
        src="/assets/cho6.jpeg"
        alt="Pet Limited Offer"
      />
    </div>

    <!-- CONTENT -->
    <div class="content">

      <h2>
        30% OFF ALL PETS<br>
        <span class="highlight">Limited time offer – Hurry up!</span>
      </h2>

      <!-- COUNTDOWN -->
      <div class="countdown">
        <div class="unit">
          <span class="value">{{ timeLeft.days }}</span>
          <span class="label">Ngày</span>
        </div>
        <span class="colon">:</span>
        <div class="unit">
          <span class="value">{{ timeLeft.hours }}</span>
          <span class="label">Giờ</span>
        </div>
        <span class="colon">:</span>
        <div class="unit">
          <span class="value">{{ timeLeft.minutes }}</span>
          <span class="label">Phút</span>
        </div>
        <span class="colon">:</span>
        <div class="unit">
          <span class="value">{{ timeLeft.seconds }}</span>
          <span class="label">Giây</span>
        </div>
      </div>

      <!-- BUTTON -->
      <a routerLink="/shop" class="cta">
        Mua Ngay
      </a>

    </div>

  </div>
</section>
