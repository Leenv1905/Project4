<div class="product-card">

  <!-- Action Button -->
  <div class="card-actions">
    <button
      mat-icon-button
      (click)="addToCart()"
      [disabled]="cartItems().some(i => i.productId === product.id)"
      [title]="cartItems().some(i => i.productId === product.id) ? 'Đã có trong giỏ hàng' : 'Thêm vào giỏ hàng'">
      <mat-icon>{{ cartItems().some(i => i.productId === product.id) ? 'check_circle' : 'shopping_cart' }}</mat-icon>
    </button>
  </div>

  <!-- Image -->
  <!-- FIX: Dùng optional chaining product.images?.[0] tránh lỗi null -->
  <!-- FIX: Thêm onerror fallback khi ảnh không load được -->
  <div class="image-wrapper">
    <img
      class="product-image"
      [src]="product.images?.[0] || 'assets/images/placeholder-pet.png'"
      [alt]="product.name"
      (click)="navigateDetail()"
      (error)="onImageError($event)"
    />
  </div>

  <div class="content">

    <!-- Name -->
    <h3 class="title" (click)="navigateDetail()">
      {{ product.name }}
    </h3>

    <!-- Meta -->
    <div class="meta">
      <span class="shop">{{ product.shopName }}</span>
      <span class="breed">{{ product.breed }} • {{ product.weight }}</span>
    </div>

    <!-- Rating -->
    <div class="rating">
      <mat-icon *ngFor="let _ of stars()">star</mat-icon>
    </div>

    <!-- Price -->
    <div class="price">
      <span class="original">
        {{ product.price | number:'1.0-0' }} ₫
      </span>
    </div>

  </div>
</div>
