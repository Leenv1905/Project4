<div class="post-card">

  <div class="image-wrapper">
    <img [src]="image" [alt]="title" />
  </div>

  <div class="content">

    <p class="category">{{ category }}</p>

    <h4 class="title" (click)="navigate()">
      {{ title }}
    </h4>

    <p class="description">
      {{ description }}
    </p>

    <span class="read-more" (click)="navigate()">Read More →</span>

  </div>

</div>
