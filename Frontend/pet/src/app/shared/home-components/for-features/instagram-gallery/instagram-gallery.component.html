<section id="instagram" class="instagram-section">

  <div class="title">
    <h3>Instagram</h3>
  </div>

  <div class="grid">

    <div
      class="grid-item"
      *ngFor="let item of instagramItems"
    >
      <app-instagram-item
        [image]="item.image"
        [link]="item.link"
      />
    </div>

  </div>

</section>
