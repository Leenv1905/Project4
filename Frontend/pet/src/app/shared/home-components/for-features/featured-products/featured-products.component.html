<section id="best-selling-items" class="best-selling">

  <!-- ERROR -->
  <div class="error" *ngIf="error()">
    {{ error() }}
  </div>

  <!-- CONTENT -->
  <ng-container *ngIf="featuredProducts().length > 0">

    <div class="header">
      <h3>Featured Products</h3>
      <a routerLink="/shop" class="view-all">
        View All →
      </a>
    </div>

    <app-product-slider [products]="featuredProducts()" />

  </ng-container>

</section>
